spring.application.name=brightlearn
server.port=8080

# ── Database ───────────────────────────────────────────────────────────────────
# Override these in production via environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/brightlearn_db
spring.datasource.username=root
spring.datasource.password=root@39

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ────────────────────────────────────────────────────────────────────────
# Override in production via environment variable: JWT_SECRET
jwt.secret=${JWT_SECRET:brightlearn-default-secret-key-change-in-production-must-be-32-chars-min}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN